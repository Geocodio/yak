name: Bug Report
description: Report a bug in Yak
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Yak Version
      description: What version of Yak are you running?
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: dropdown
    id: channel
    attributes:
      label: Channel
      description: Which channel is affected?
      options:
        - Slack
        - Linear
        - Sentry
        - GitHub
        - Dashboard
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Configure channel...
        2. Send a webhook...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output here.
      render: shell
    validations:
      required: false
