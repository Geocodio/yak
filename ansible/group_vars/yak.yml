---
yak_user: yak
yak_home: /home/yak
yak_repo_path: /home/yak/repos
yak_data_path: /home/yak/data
yak_claude_path: /home/yak/.claude
yak_container_name: yak

swap_size_mb: 4096

ufw_allowed_ports:
  - "22"
  - "80"
  - "443"

mariadb_container_name: yak-mariadb
mariadb_data_path: /home/yak/mariadb-data

# Incus sandbox settings
# incus_zfs_device: /dev/sdb  # Uncomment and set to a dedicated disk for best performance
incus_zfs_pool_size: 100G     # Only used when no dedicated disk (file-backed pool)
incus_zfs_arc_max: "8589934592"  # 8GB ZFS ARC cache (tune based on total RAM)
