---
yak_user: yak
yak_home: /home/yak
yak_repo_path: /home/yak/repos
yak_data_path: /home/yak/data
yak_claude_path: /home/yak/.claude
yak_container_name: yak

swap_size_mb: 4096

# Branch deployments: DNS-01 wildcard TLS
# Set caddy_dns_provider to one of Caddy's supported providers (cloudflare, route53, etc.)
# Leave empty/undefined to keep the dashboard-only Caddyfile. Requires setting
# caddy_dns_provider_api_token in the vault.
caddy_dns_provider: cloudflare

ufw_allowed_ports:
  - "22"
  - "80"
  - "443"

mariadb_container_name: yak-mariadb
mariadb_data_path: /home/yak/mariadb-data

# Incus sandbox settings
# incus_zfs_device: /dev/sdb  # Uncomment and set to a dedicated disk for best performance
incus_zfs_pool_size: 100G     # Only used when no dedicated disk (file-backed pool)
incus_zfs_arc_max: "8589934592"  # 8GB ZFS ARC cache (tune based on total RAM)

# yak-base image version. Bump this whenever the base template build
# changes in a way repo templates need to inherit (new packages, swapped
# browser engine, etc.). MUST match `yak.sandbox.base_version` in
# config/yak.php — the app reads that config value and invalidates repo
# templates whose stored `sandbox_base_version` is older.
yak_sandbox_base_version: 3
