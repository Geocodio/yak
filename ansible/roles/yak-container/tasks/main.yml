---
- name: Ensure /etc/yak directory exists
  ansible.builtin.file:
    path: /etc/yak
    state: directory
    mode: "0700"
    owner: root
    group: root

- name: Template env file
  ansible.builtin.template:
    src: env.j2
    dest: /etc/yak/env
    owner: root
    group: root
    mode: "0600"

- name: Write GitHub App private key
  ansible.builtin.copy:
    content: "{{ github_app_private_key | default('') }}"
    dest: /etc/yak/github-app.pem
    owner: root
    group: root
    mode: "0644"
  when: github_app_private_key | default('') | length > 0

- name: Pull Yak Docker image
  community.docker.docker_image:
    name: "geocodio/yak"
    tag: "{{ yak_image_tag | default('latest') }}"
    source: pull
    force_source: true

- name: Run Yak container
  community.docker.docker_container:
    name: "{{ yak_container_name }}"
    image: "geocodio/yak:{{ yak_image_tag | default('latest') }}"
    state: started
    restart_policy: unless-stopped
    shm_size: 256M
    ports:
      - "8080:80"
    volumes:
      - "{{ yak_data_path }}:/data"
      - "{{ yak_claude_path }}:/home/yak/.claude"
      - "/etc/yak/github-app.pem:/etc/yak/github-app.pem:ro"
      - "{{ yak_home }}/mcp-config.json:/home/yak/mcp-config.json:ro"
      # Incus Unix socket — the worker calls `incus` to manage sandbox containers
      - "/var/lib/incus/unix.socket:/var/lib/incus/unix.socket"
    env_file: /etc/yak/env
    recreate: true
    networks:
      - name: yak

