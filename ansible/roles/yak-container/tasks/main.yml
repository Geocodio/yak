---
- name: Ensure /etc/yak directory exists
  ansible.builtin.file:
    path: /etc/yak
    state: directory
    mode: "0700"
    owner: root
    group: root

- name: Template env file
  ansible.builtin.template:
    src: env.j2
    dest: /etc/yak/env
    owner: root
    group: root
    mode: "0600"

- name: Pull Yak Docker image
  community.docker.docker_image:
    name: "geocodio/yak"
    tag: "{{ yak_image_tag | default('latest') }}"
    source: pull
    force_source: true

- name: Run Yak container
  community.docker.docker_container:
    name: "{{ yak_container_name }}"
    image: "geocodio/yak:{{ yak_image_tag | default('latest') }}"
    state: started
    restart_policy: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - "{{ yak_repo_path }}:/home/yak/repos"
      - "{{ yak_data_path }}:/data"
      - "{{ yak_claude_path }}:/home/yak/.claude"
      - "{{ yak_home }}/mcp-config.json:/home/yak/mcp-config.json:ro"
      - "/var/run/docker.sock:/var/run/docker.sock"
    env_file: /etc/yak/env
    recreate: true
