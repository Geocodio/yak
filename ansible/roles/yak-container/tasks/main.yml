---
- name: Ensure /etc/yak directory exists
  ansible.builtin.file:
    path: /etc/yak
    state: directory
    mode: "0700"
    owner: root
    group: root

- name: Template env file
  ansible.builtin.template:
    src: env.j2
    dest: /etc/yak/env
    owner: root
    group: root
    mode: "0600"

- name: Write GitHub App private key
  ansible.builtin.copy:
    content: "{{ github_app_private_key | default('') }}"
    dest: /etc/yak/github-app.pem
    owner: root
    group: root
    mode: "0644"
  when: github_app_private_key | default('') | length > 0

- name: Pull Yak Docker image
  community.docker.docker_image:
    name: "geocodio/yak"
    tag: "{{ yak_image_tag | default('latest') }}"
    source: pull
    force_source: true

# Check whether a container is already running before attempting to
# drain. The first deploy on a new host has nothing to drain.
- name: Check for existing Yak container
  community.docker.docker_container_info:
    name: "{{ yak_container_name }}"
  register: yak_container_info

- name: Drain running tasks before container recreate
  community.docker.docker_container_exec:
    container: "{{ yak_container_name }}"
    user: www-data
    command: "php /app/artisan yak:drain --wait={{ yak_drain_wait_seconds | default(300) }}"
  when: yak_container_info.exists and yak_container_info.container.State.Running | default(false)
  # Drain is best-effort — if it fails (e.g. DB unreachable) we still
  # want the deploy to proceed rather than leave the instance stuck on
  # a broken image.
  failed_when: false

- name: Run Yak container
  community.docker.docker_container:
    name: "{{ yak_container_name }}"
    image: "geocodio/yak:{{ yak_image_tag | default('latest') }}"
    state: started
    restart_policy: unless-stopped
    shm_size: 256M
    ports:
      # Bind to loopback only: Caddy on the host reverse-proxies from
      # localhost:8080 → the container. Publishing to 0.0.0.0 would
      # expose the dashboard on the public internet over plain HTTP,
      # since Docker's iptables rules bypass UFW.
      - "127.0.0.1:8080:80"
    volumes:
      - "{{ yak_data_path }}:/data"
      - "{{ yak_claude_path }}:/home/yak/.claude"
      - "/etc/yak/github-app.pem:/etc/yak/github-app.pem:ro"
      - "{{ yak_home }}/mcp-config.json:/home/yak/mcp-config.json:ro"
      - "{{ yak_home }}/.docker:/home/yak/.docker:ro"
      # Bind the whole Incus state dir, not just the unix.socket file.
      # Socket files pin the inode, so any Incus daemon restart on the
      # host (new inode) would leave the container stuck referencing a
      # stale, deleted socket. Mounting the parent dir re-resolves the
      # socket path on each access.
      - "/var/lib/incus:/var/lib/incus"
    env_file: /etc/yak/env
    recreate: true
    healthcheck:
      # Probe as www-data so the incus CLI writes its config under
      # /var/www/.config/incus with www-data ownership — otherwise the
      # HEALTHCHECK (running as root) would create a root-owned config
      # dir that the worker can't read, masquerading as "daemon
      # unreachable" in the app's own health check.
      test: ["CMD-SHELL", "sudo -u www-data -H incus list -c n >/dev/null 2>&1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - name: yak

# Wait for php-fpm / workers to be ready inside the fresh container
# before clearing the drain flag. Artisan runs through Laravel's
# bootstrap, so the DB cache store must be reachable.
- name: Wait for Yak container health
  community.docker.docker_container_info:
    name: "{{ yak_container_name }}"
  register: yak_post_start
  retries: 12
  delay: 5
  until: yak_post_start.exists and yak_post_start.container.State.Running | default(false)

- name: Clear drain flag so workers resume
  community.docker.docker_container_exec:
    container: "{{ yak_container_name }}"
    user: www-data
    command: "php /app/artisan yak:resume"
  failed_when: false

