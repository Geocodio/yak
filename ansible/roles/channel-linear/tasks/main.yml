---
- name: Verify Linear credentials are configured
  ansible.builtin.assert:
    that:
      - linear_webhook_secret is defined and linear_webhook_secret | length > 0
      - linear_oauth_client_id is defined and linear_oauth_client_id | length > 0
      - linear_oauth_client_secret is defined and linear_oauth_client_secret | length > 0
    fail_msg: >-
      Linear requires an OAuth app (linear_oauth_client_id, linear_oauth_client_secret)
      plus the app's webhook signing secret (linear_webhook_secret). Register an app at
      https://linear.app/settings/api/applications and enable "Actor: app".

- name: Display Linear webhook + authorization reminder
  ansible.builtin.debug:
    msg:
      - "Linear channel enabled (OAuth app)."
      - "1. Webhook URL on the Linear OAuth app:"
      - "     https://{{ yak_domain }}/webhooks/linear"
      - "   Subscribe to: Issue label events."
      - "2. Create a 'yak' label in your workspace."
      - "3. Authorize the app from Yak:"
      - "     https://{{ yak_domain }}/settings/linear"
      - "   (Actions will then post as 'Yak', not the authorizing user.)"
