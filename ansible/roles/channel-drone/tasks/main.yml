---
- name: Verify Drone credentials are configured
  ansible.builtin.assert:
    that:
      - drone_url is defined and drone_url | length > 0
      - drone_token is defined and drone_token | length > 0
    fail_msg: "Drone url and token are required for the Drone CI channel."

- name: Display Drone CI polling reminder
  ansible.builtin.debug:
    msg:
      - "Drone CI channel enabled."
      - "Drone has no outbound webhooks — Yak polls the Drone API once a"
      - "minute to pick up CI results (yak:poll-drone-ci)."
      - "Set ci_system: drone on repos that use Drone CI."
