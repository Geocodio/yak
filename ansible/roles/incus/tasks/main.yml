---
# Incus + ZFS provisioning for sandboxed task execution.
#
# Each task gets its own Incus system container cloned from a ZFS
# copy-on-write snapshot. Containers have their own Docker daemon,
# network namespace, and filesystem — fully isolated from the yak host.

- name: Install ZFS kernel module and utilities
  ansible.builtin.apt:
    name:
      - "linux-headers-{{ ansible_kernel }}"
      - zfs-dkms
      - zfsutils-linux
    state: present
    update_cache: true

- name: Load ZFS kernel module
  community.general.modprobe:
    name: zfs
    state: present
    persistent: present

- name: Ensure Incus state directory exists (needed for file-backed ZFS pool)
  ansible.builtin.file:
    path: /var/lib/incus
    state: directory
    mode: "0755"

- name: Check if ZFS pool exists
  ansible.builtin.command: zpool list incus-pool
  register: zpool_check
  changed_when: false
  failed_when: false

- name: Create ZFS pool on dedicated disk
  ansible.builtin.command: >
    zpool create
    -o ashift=12
    -O compression=lz4
    -O atime=off
    incus-pool {{ incus_zfs_device | default('/dev/sdb') }}
  when: zpool_check.rc != 0 and incus_zfs_device is defined
  changed_when: true

- name: Create ZFS pool using a file (fallback when no dedicated disk)
  ansible.builtin.shell: |
    truncate -s {{ incus_zfs_pool_size | default('100G') }} /var/lib/incus/zfs-pool.img
    zpool create incus-pool /var/lib/incus/zfs-pool.img
    zfs set compression=lz4 incus-pool
  when: zpool_check.rc != 0 and incus_zfs_device is not defined
  changed_when: true

- name: Configure ZFS ARC max memory
  ansible.builtin.copy:
    dest: /etc/modprobe.d/zfs.conf
    content: |
      options zfs zfs_arc_max={{ incus_zfs_arc_max | default('8589934592') }}
    mode: "0644"

- name: Apply ZFS ARC limit immediately
  ansible.builtin.shell: "echo {{ incus_zfs_arc_max | default('8589934592') }} > /sys/module/zfs/parameters/zfs_arc_max"
  changed_when: true

- name: Add Incus (Zabbly) GPG key
  ansible.builtin.get_url:
    url: https://pkgs.zabbly.com/key.asc
    dest: /etc/apt/keyrings/zabbly.gpg
    mode: "0644"

- name: Add Incus (Zabbly) repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/zabbly.gpg] https://pkgs.zabbly.com/incus/stable {{ ansible_distribution_release }} main"
    state: present

- name: Install Incus
  ansible.builtin.apt:
    name: incus
    state: present
    update_cache: true

- name: Add yak user to incus-admin group
  ansible.builtin.user:
    name: "{{ yak_user }}"
    groups: incus-admin
    append: true

- name: Check if Incus storage pool exists
  ansible.builtin.command: incus storage show default
  register: incus_storage_check
  changed_when: false
  failed_when: false

- name: Create Incus storage pool from existing ZFS pool
  ansible.builtin.command: incus storage create default zfs source=incus-pool
  when: incus_storage_check.rc != 0
  changed_when: true

- name: Check if Incus sandbox network exists
  ansible.builtin.command: incus network show yak-sandbox
  register: incus_network_check
  changed_when: false
  failed_when: false

- name: Create Incus sandbox network
  ansible.builtin.command: >
    incus network create yak-sandbox
    ipv4.address=10.100.0.1/24
    ipv4.nat=true
    ipv6.address=none
    --description="Yak sandbox network"
  when: incus_network_check.rc != 0
  changed_when: true

- name: Configure default profile security options
  ansible.builtin.command: incus profile set default {{ item }}
  loop:
    - security.nesting=true
    - security.syscalls.intercept.mknod=true
    - security.syscalls.intercept.setxattr=true
  changed_when: true

- name: Check if default profile has root disk device
  ansible.builtin.command: incus profile device get default root path
  register: profile_root_check
  changed_when: false
  failed_when: false

- name: Attach root disk to default profile
  ansible.builtin.command: incus profile device add default root disk path=/ pool=default
  when: profile_root_check.rc != 0
  changed_when: true

- name: Check if default profile has network device
  ansible.builtin.command: incus profile device get default eth0 nictype
  register: profile_eth0_check
  changed_when: false
  failed_when: false

- name: Attach network device to default profile
  ansible.builtin.command: incus profile device add default eth0 nic name=eth0 network=yak-sandbox
  when: profile_eth0_check.rc != 0
  changed_when: true

- name: Set UFW default forward policy to ACCEPT (sandboxes need outbound NAT)
  ansible.builtin.lineinfile:
    path: /etc/default/ufw
    regexp: '^DEFAULT_FORWARD_POLICY='
    line: 'DEFAULT_FORWARD_POLICY="ACCEPT"'
  notify: reload ufw

- name: Block sandbox network from accessing host services
  community.general.ufw:
    rule: deny
    direction: in
    from_ip: 10.100.0.0/24
    to_port: "{{ item }}"
    proto: tcp
    comment: "Block Incus sandboxes from yak host services"
  loop:
    - "80"    # yak web app
    - "3306"  # MariaDB
    - "8080"  # yak web app (Caddy proxy)

# UFW defaults to DROP on INPUT; without these allows, dnsmasq on the
# yak-sandbox bridge never sees DHCP/DNS requests from the containers.
- name: Allow DHCP and DNS on the sandbox bridge
  community.general.ufw:
    rule: allow
    direction: in
    interface: yak-sandbox
    to_port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "Incus bridge services (dnsmasq)"
  loop:
    - { port: "67", proto: "udp" }  # DHCP
    - { port: "53", proto: "udp" }  # DNS
    - { port: "53", proto: "tcp" }  # DNS (large responses)

- name: Increase inotify limits for container density
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: true
    reload: true
  loop:
    - { key: "fs.inotify.max_user_instances", value: "1024" }
    - { key: "fs.inotify.max_user_watches", value: "524288" }

- name: Check if base template exists at current version
  # The marker file is versioned: bumping `yak_sandbox_base_version` makes
  # this test fail even if `yak-base` already exists, which forces a
  # rebuild below. Repo templates cloned from the previous yak-base get
  # invalidated separately by ensureTemplateVersionCurrent() in the app.
  ansible.builtin.shell: >
    incus info yak-base >/dev/null 2>&1 &&
    incus file pull yak-base/etc/yak/base-version-{{ yak_sandbox_base_version }} - >/dev/null 2>&1
  register: base_template_check
  changed_when: false
  failed_when: false

- name: Tear down outdated yak-base (base_version bumped)
  # Only runs when yak-base exists but the version marker is missing. Any
  # repo templates cloned from it stay in place on disk — the app
  # invalidates them on the next task clone via the stored
  # sandbox_base_version column.
  ansible.builtin.shell: |
    set -euo pipefail
    if incus info yak-base >/dev/null 2>&1; then
      incus stop yak-base --force 2>/dev/null || true
      incus snapshot delete yak-base ready 2>/dev/null || true
      incus delete yak-base --force
    fi
  when: base_template_check.rc != 0
  changed_when: true

- name: Create base template container
  ansible.builtin.shell: |
    set -euo pipefail

    incus launch images:ubuntu/24.04 yak-base

    # Wait for the container to come up and acquire a DHCP lease. Without
    # this, apt-get runs before the network is ready and silently fails.
    for i in $(seq 1 30); do
      if incus exec yak-base -- getent hosts deb.debian.org >/dev/null 2>&1; then
        break
      fi
      sleep 2
    done

    # Install Docker inside the container
    incus exec yak-base -- bash -euo pipefail -c '
      apt-get update
      apt-get install -y ca-certificates curl gnupg lsb-release git sudo

      # Add Docker repository
      install -m 0755 -d /etc/apt/keyrings
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
      chmod a+r /etc/apt/keyrings/docker.asc
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list

      # Add NodeSource repository
      curl -fsSL https://deb.nodesource.com/setup_20.x | bash -

      # Install everything
      apt-get update
      apt-get install -y \
        docker-ce docker-ce-cli containerd.io docker-compose-plugin \
        nodejs \
        php8.3-cli php8.3-common php8.3-curl php8.3-mbstring php8.3-xml php8.3-zip php8.3-mysql php8.3-sqlite3 php8.3-gd php8.3-bcmath \
        ffmpeg \
        unzip zip

      # Install Composer
      curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer

      # Install Claude Code CLI + agent-browser. chromium-browser on
      # Ubuntu 24.04 is a snap redirect that breaks inside Incus (snap
      # daemonization inside an unprivileged container leaves chrome
      # processes as zombies and the agent-browser daemon hangs). Use
      # Playwright-bundled Chromium instead — a real deb-deps install
      # with a maintained binary under /home/yak/.cache/ms-playwright.
      npm install -g @anthropic-ai/claude-code agent-browser playwright

      # Create yak user (mirrors the host setup)
      useradd -m -s /bin/bash yak
      usermod -aG docker yak
      echo "yak ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/yak
      chmod 440 /etc/sudoers.d/yak

      # Install Playwright Chromium + OS deps for the yak user (fonts,
      # libnss3, libasound2, etc.). Binary lands in
      # /home/yak/.cache/ms-playwright and is reused by agent-browser.
      # Use `sudo -iu` so the shell runs with /home/yak as CWD — without
      # this, npx tries to create temp files in /root and fails EACCES.
      sudo -iu yak npx --yes playwright install --with-deps chromium

      # Point agent-browser at Playwright instead of auto-detecting system
      # chromium. `default.engine` is read by the daemon on launch; seeding
      # it here means the very first `agent-browser` call picks the right
      # engine without any ad-hoc env var discovery.
      mkdir -p /home/yak/.agent-browser
      echo playwright > /home/yak/.agent-browser/default.engine
      chown -R yak:yak /home/yak/.agent-browser
      echo "export AGENT_BROWSER_ENGINE=playwright" >> /home/yak/.bashrc

      # Create workspace and results directories
      mkdir -p /workspace /results /home/yak/.claude
      chown yak:yak /workspace /results /home/yak/.claude

      # Enable and start Docker
      systemctl enable docker
      systemctl start docker

      # Pre-pull common Docker images to speed up setup tasks
      docker pull mariadb:11 || true
      docker pull redis:7-alpine || true
      docker pull postgres:16 || true

      # Write the version marker so future ansible runs can detect when
      # yak-base drifts from the current config and rebuild.
      mkdir -p /etc/yak
      touch /etc/yak/base-version-{{ yak_sandbox_base_version }}
    '

    # Install the curated Claude Code skills as the yak user
    for skill_def in \
      "https://github.com/vercel-labs/agent-browser:agent-browser" \
      "https://github.com/vercel-labs/agent-skills:vercel-react-best-practices" \
      "https://github.com/anthropics/skills:frontend-design" \
      "https://github.com/vercel-labs/agent-skills:web-design-guidelines" \
      "https://github.com/remotion-dev/skills:remotion-best-practices" \
      "https://github.com/nextlevelbuilder/ui-ux-pro-max-skill:ui-ux-pro-max" \
      "https://github.com/pbakaus/impeccable:polish"; do
      repo="${skill_def%:*}"
      skill="${skill_def##*:}"
      incus exec yak-base -- sudo -u yak npx skills add "$repo" --skill "$skill" || true
    done

    # Stop the container and create the base snapshot
    incus stop yak-base
    incus snapshot create yak-base ready
  when: base_template_check.rc != 0
  changed_when: true

- name: Print Incus status
  ansible.builtin.command: incus list --format table
  register: incus_list
  changed_when: false

- name: Display Incus containers
  ansible.builtin.debug:
    msg: "{{ incus_list.stdout_lines }}"

- name: Create sandbox cleanup cron job
  ansible.builtin.cron:
    name: "Cleanup stale Incus sandbox containers"
    minute: "0"
    hour: "*/6"
    user: root
    job: >
      incus list --format csv -c n,s | grep '^task-' | grep ',STOPPED' |
      cut -d',' -f1 | xargs -I{} incus delete {} --force 2>/dev/null || true

- name: Weekly ZFS pool trim for NVMe longevity
  ansible.builtin.cron:
    name: "ZFS trim incus-pool"
    weekday: "0"
    hour: "3"
    minute: "0"
    user: root
    job: "zpool trim incus-pool"
