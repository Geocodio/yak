---
- name: Verify Claude Code CLI is available in container
  ansible.builtin.command:
    cmd: docker exec {{ yak_container_name }} claude --version
  register: claude_version
  changed_when: false

- name: Display Claude CLI version
  ansible.builtin.debug:
    msg: "Claude Code CLI version: {{ claude_version.stdout }}"

- name: Print Claude CLI login instructions
  ansible.builtin.debug:
    msg:
      - "Claude Code CLI requires interactive login."
      - ""
      - "SSH into the server and run:"
      - "  docker exec -u yak -it {{ yak_container_name }} claude login"
      - ""
      - "IMPORTANT: Always use -u yak when running claude commands."
      - "Running as root will create config files that the worker cannot read."
      - ""
      - "Follow the browser-based OAuth flow. The session token"
      - "persists in the mounted /home/yak/.claude volume."
      - "This only needs to be done once (or when the token expires)."
