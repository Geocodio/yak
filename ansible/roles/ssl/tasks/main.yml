---
- name: Install Caddy prerequisites
  ansible.builtin.apt:
    name:
      - debian-keyring
      - debian-archive-keyring
      - apt-transport-https
    state: present

- name: Download Caddy GPG key
  ansible.builtin.get_url:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    dest: /etc/apt/keyrings/caddy.asc
    mode: "0644"

- name: Add Caddy repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/caddy.asc] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main"
    state: present

- name: Install Caddy
  ansible.builtin.apt:
    name: caddy
    state: present
    update_cache: true

- name: Download Caddy binary with DNS-01 provider plugin
  ansible.builtin.get_url:
    url: "https://caddyserver.com/api/download?os=linux&arch=amd64&p=github.com%2Fcaddy-dns%2F{{ caddy_dns_provider }}"
    dest: /usr/bin/caddy
    mode: "0755"
    owner: root
    group: root
    force: true
  when: caddy_dns_provider | default('') | length > 0
  notify: restart caddy

- name: Ensure Caddy has capability to bind privileged ports
  ansible.builtin.command:
    cmd: setcap cap_net_bind_service=+ep /usr/bin/caddy
  changed_when: false
  when: caddy_dns_provider | default('') | length > 0

- name: Configure Caddy
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    mode: "0644"
  notify: restart caddy

- name: Ensure Caddy log directory exists with correct ownership
  ansible.builtin.file:
    path: /var/log/caddy
    state: directory
    owner: caddy
    group: caddy
    mode: "0755"
    recurse: true

- name: Configure Caddy log rotation
  ansible.builtin.copy:
    dest: /etc/logrotate.d/caddy
    content: |
      /var/log/caddy/*.log {
          daily
          rotate 14
          compress
          delaycompress
          missingok
          notifempty
          create 0640 caddy caddy
          sharedscripts
          postrotate
              kill -USR1 $(cat /run/caddy.pid 2>/dev/null) 2>/dev/null || true
          endscript
      }
    mode: "0644"

- name: Enable and start Caddy
  ansible.builtin.systemd:
    name: caddy
    enabled: true
    state: started
