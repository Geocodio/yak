---
- name: Configure git credential helper in container
  ansible.builtin.command:
    cmd: >
      docker exec {{ yak_container_name }}
      git config --global credential.helper
      '!/usr/bin/php /app/artisan yak:git-credential'
  changed_when: true

- name: Clone repositories via container
  ansible.builtin.command:
    cmd: >
      docker exec {{ yak_container_name }}
      git clone {{ item.git_url }} /home/yak/repos/{{ item.slug }}
    creates: "{{ yak_repo_path }}/{{ item.slug }}/.git"
  loop: "{{ yak_repos }}"
  loop_control:
    label: "{{ item.slug }}"

- name: Seed repositories into database
  ansible.builtin.command:
    cmd: >
      docker exec {{ yak_container_name }} php artisan tinker --execute
      'App\Models\Repository::firstOrCreate(
        ["slug" => "{{ item.slug }}"],
        [
          "name" => "{{ item.name }}",
          "git_url" => "{{ item.git_url }}",
          "path" => "/home/yak/repos/{{ item.slug }}",
          "default_branch" => "{{ item.default_branch }}",
          "ci_system" => "{{ item.ci_system | default("github_actions") }}",
          "is_default" => {{ item.is_default | default(false) | ternary("true", "false") }},
          "sentry_project" => {{ item.sentry_project | default("") | ternary("\"" + (item.sentry_project | default("")) + "\"", "null") }}
        ]
      );'
  loop: "{{ yak_repos }}"
  loop_control:
    label: "{{ item.slug }}"
  changed_when: true
