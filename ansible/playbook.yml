---
- name: Provision Yak server
  hosts: all
  become: true
  vars_files:
    - vault/secrets.yml
    - group_vars/yak.yml

  pre_tasks:
    - name: Check for existing APP_KEY on server
      ansible.builtin.stat:
        path: /etc/yak/app_key
      register: app_key_file
      when: yak_app_key is not defined or yak_app_key | length == 0
      tags: always

    - name: Read existing APP_KEY from server
      ansible.builtin.slurp:
        src: /etc/yak/app_key
      register: app_key_contents
      when:
        - yak_app_key is not defined or yak_app_key | length == 0
        - app_key_file.stat.exists | default(false)
      tags: always

    - name: Use existing APP_KEY from server
      ansible.builtin.set_fact:
        yak_app_key: "{{ app_key_contents.content | b64decode | trim }}"
      when:
        - yak_app_key is not defined or yak_app_key | length == 0
        - app_key_contents.content is defined
      tags: always

    - name: Generate new APP_KEY
      ansible.builtin.set_fact:
        yak_app_key: "{{ lookup('pipe', 'openssl rand -base64 32') }}"
      when: yak_app_key is not defined or yak_app_key | length == 0
      tags: always

    - name: Ensure /etc/yak directory exists
      ansible.builtin.file:
        path: /etc/yak
        state: directory
        mode: "0700"
        owner: root
        group: root
      tags: always

    - name: Persist APP_KEY to server
      ansible.builtin.copy:
        content: "{{ yak_app_key }}"
        dest: /etc/yak/app_key
        mode: "0600"
        owner: root
        group: root
      tags: always

    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - yak_domain is defined and yak_domain | length > 0
          - anthropic_api_key is defined and anthropic_api_key | length > 0
          - github_org is defined and github_org | length > 0
          - google_oauth_client_id is defined and google_oauth_client_id | length > 0
          - google_oauth_client_secret is defined and google_oauth_client_secret | length > 0
          - google_oauth_allowed_domains is defined and google_oauth_allowed_domains | length > 0
        fail_msg: "Required variables are missing. Check vault/secrets.yml."
      tags: always

  roles:
    - role: base
      tags: [base]

    - role: docker
      tags: [docker]

    - role: ssl
      tags: [ssl]

    - role: github-app
      tags: [github-app]
      when: not (github_app_id | default(''))
            or not (github_app_private_key | default(''))
            or not (github_installation_id | default(''))

    - role: mcp-config
      tags: [mcp-config, yak-app, secrets]

    - role: channel-slack
      tags: [channel-slack]
      when: slack_bot_token is defined and slack_bot_token | length > 0

    - role: channel-linear
      tags: [channel-linear]
      when: linear_webhook_secret is defined and linear_webhook_secret | length > 0

    - role: channel-sentry
      tags: [channel-sentry]
      when: sentry_auth_token is defined and sentry_auth_token | length > 0

    - role: channel-drone
      tags: [channel-drone]
      when: drone_url is defined and drone_url | length > 0

    - role: mariadb
      tags: [mariadb]

    - role: yak-container
      tags: [yak-container, yak-app, secrets]

    - role: claude-code-config
      tags: [claude-code-config, yak-app]
