# Ansible Vault secrets for Yak provisioner
# Copy to secrets.yml and encrypt: ansible-vault encrypt ansible/vault/secrets.yml
# Edit encrypted: ansible-vault edit ansible/vault/secrets.yml

# === Required ===

yak_domain: yak.yourcompany.com
anthropic_api_key: sk-ant-...
github_org: your-org

# Google OAuth (dashboard authentication)
google_oauth_client_id: ""
google_oauth_client_secret: ""
google_oauth_allowed_domains: "yourcompany.com"

# === Auto-generated (leave blank) ===

yak_app_key: "" # Laravel APP_KEY, generated on first provision and persisted to /etc/yak/app_key

# GitHub App (leave blank on first run — the playbook walks you through creation,
# then you fill these in and re-run)
github_app_id: ""
github_app_private_key: ""
github_installation_id: ""
github_webhook_secret: ""

# GitHub MCP server (optional — for Claude to browse GitHub repos/issues/PRs)
# Requires a Personal Access Token, NOT the App private key
github_personal_access_token: ""

# === Optional Channels (leave blank to disable) ===

# Slack
slack_bot_token: ""
slack_signing_secret: ""

# Linear
linear_api_key: ""
linear_webhook_secret: ""

# Sentry
sentry_auth_token: ""
sentry_webhook_secret: ""
sentry_org_slug: ""

# Drone CI
drone_url: ""
drone_token: ""

# Database
mariadb_root_password: "change-me"
mariadb_password: "change-me"

# === Extra Agent Environment Variables ===
# Passed to the agent process as env vars — use for tokens repos need (e.g. npm registries)
# agent_extra_env:
#   NODE_AUTH_TOKEN: "ghp_..."
#   SOME_OTHER_TOKEN: "..."
