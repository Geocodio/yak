[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:php-fpm]
command=php-fpm -F -R
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:yak-claude-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /app/artisan queue:work database --queue=yak-claude --timeout=3600 --memory=8192 --tries=3 --sleep=3
user=www-data
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
numprocs=4
stdout_logfile=/app/storage/logs/yak-claude-worker.log
stderr_logfile=/app/storage/logs/yak-claude-worker-error.log
stopwaitsecs=3610

[program:default-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /app/artisan queue:work database --queue=default --timeout=30 --memory=256 --tries=3 --sleep=3
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
numprocs=3
stdout_logfile=/app/storage/logs/default-worker.log
stopwaitsecs=40

[program:yak-render-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /app/artisan queue:work database --queue=yak-render --timeout=900 --memory=2048 --tries=2 --sleep=3
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
numprocs=1
stdout_logfile=/app/storage/logs/yak-render-worker.log
stderr_logfile=/app/storage/logs/yak-render-worker-error.log
stopwaitsecs=910

[program:yak-deployments-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /app/artisan queue:work database --queue=yak-deployments --timeout=900 --memory=512 --tries=3 --sleep=3
user=www-data
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
numprocs=2
stdout_logfile=/app/storage/logs/yak-deployments-worker.log
stderr_logfile=/app/storage/logs/yak-deployments-worker-error.log
stopwaitsecs=910

[program:scheduler]
command=bash -c "while true; do php /app/artisan schedule:run --no-interaction >> /app/storage/logs/scheduler.log 2>&1; sleep 60; done"
autostart=true
autorestart=true
stdout_logfile=/app/storage/logs/scheduler.log
